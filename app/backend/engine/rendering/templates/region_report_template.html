<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>{{PAGE_TITLE}}</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: {
                "accent-red": "#E63946",
                "surface-bright": "#fbf9f9",
                "inverse-surface": "#303031",
                "surface-container-lowest": "#ffffff",
                "secondary": "#005db7",
                "on-primary": "#ffffff",
                "error": "#ba1a1a",
                "primary-container": "#003478",
                "on-primary-container": "#7d9fe9",
                "surface-dim": "#dbdad9",
                "surface-container-low": "#f5f3f3",
                "surface-border": "#DCDCDC",
                "surface-container-highest": "#e3e2e2",
                "surface-container": "#efeded",
                "surface-variant": "#e3e2e2",
                "inverse-on-surface": "#f2f0f0",
                "outline": "#747782",
                "surface-light": "#F8F9FA",
                "text-secondary": "#555555",
                "surface-tint": "#395da2",
                "on-surface-variant": "#434751",
                "outline-variant": "#c4c6d2",
                "text-disabled": "#BEBEBE",
                "secondary-container": "#599bfe",
                "on-secondary": "#ffffff",
                "background": "#fbf9f9",
                "surface": "#fbf9f9",
                "on-background": "#1b1c1c",
                "text-primary": "#000000",
                "surface-container-high": "#e9e8e7",
                "primary": "#00204e",
                "on-surface": "#1b1c1c"
            },
            borderRadius: {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            spacing: {
                "sm": "8px",
                "gutter": "24px",
                "base": "4px",
                "xl": "32px",
                "lg": "24px",
                "xs": "4px",
                "md": "16px"
            },
            fontFamily: {
                "headline-md": ["Hanken Grotesk"],
                "label-md": ["Hanken Grotesk"],
                "headline-lg": ["Hanken Grotesk"],
                "body-sm": ["Hanken Grotesk"],
                "label-sm": ["Hanken Grotesk"],
                "body-lg": ["Hanken Grotesk"],
                "body-md": ["Hanken Grotesk"]
            },
            fontSize: {
                "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}],
                "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
        }
    }
}
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .modal-backdrop { background-color: rgba(0, 32, 78, 0.4); backdrop-filter: blur(8px); }
    @media print {
        .no-print { display: none !important; }
        .tab-panel { display: flex !important; }
        nav { display: none !important; }
        .modal-backdrop { background: #fff; backdrop-filter: none; }
        .fixed { position: static; }
    }
</style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center">

<div class="modal-backdrop fixed inset-0 z-40"></div>

<div class="fixed inset-0 z-50 flex items-center justify-center p-md lg:p-lg">
    <div class="w-full max-w-6xl h-full max-h-full rounded-xl shadow-[0_12px_24px_rgba(0,32,78,0.16)] flex flex-col overflow-hidden relative bg-surface-container-lowest">

        <!-- 헤더 -->
        <header class="border-b border-surface-border px-lg py-lg flex flex-col md:flex-row md:items-end justify-between gap-md shrink-0">
            <div class="flex items-start gap-md">
                <div class="p-sm bg-primary-container text-on-primary-container rounded-lg flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined text-headline-lg fill">public</span>
                </div>
                <div>
                    <div class="flex flex-wrap items-center gap-sm mb-xs">
                        <span class="font-label-sm text-label-sm text-text-secondary uppercase tracking-wider">Report ID: {{REPORT_ID}}</span>
                        <span class="w-1 h-1 rounded-full bg-surface-border"></span>
                        <span class="font-label-sm text-label-sm text-text-secondary">생성: {{CREATED_AT}}</span>
                        <span class="w-1 h-1 rounded-full bg-surface-border"></span>
                        <span class="font-label-sm text-label-sm text-text-secondary">베이스라인: {{BASELINE}}</span>
                    </div>
                    <h1 class="font-headline-lg text-headline-lg text-primary m-0">{{REPORT_HEADING}}</h1>
                    <p class="font-body-md text-body-md text-on-surface-variant mt-xs mb-0">베이스라인국 대비 권역 내 진출 후보국의 퀵윈(빠른 성과) 진단.</p>
                </div>
            </div>
            <div class="flex items-center gap-sm shrink-0 no-print">
                <button onclick="window.print()" class="flex items-center gap-sm px-md py-sm border border-primary text-primary rounded-lg font-label-md text-label-md hover:bg-surface-light transition-colors">
                    <span class="material-symbols-outlined text-[18px]">picture_as_pdf</span> PDF 다운로드
                </button>
            </div>
        </header>

        <!-- 탭 네비게이션 -->
        <nav class="border-b border-surface-border px-lg flex gap-xl shrink-0 overflow-x-auto no-scrollbar no-print">
            {{TAB_NAV}}
        </nav>

        <!-- 콘텐츠 영역 -->
        <div class="flex-1 overflow-y-auto p-lg bg-surface flex flex-col gap-xl">
            {{TAB_PANELS}}
        </div>

        <!-- 푸터 -->
        <footer class="border-t border-surface-border px-lg py-md flex flex-col md:flex-row md:items-center justify-between gap-sm shrink-0 font-label-sm text-label-sm text-text-secondary">
            <span>{{FOOTER_META}}</span>
            <span>Hyundai Capital · 권역 진단 보고서(PR2) · region_render_engine</span>
        </footer>

    </div>
</div>

<script>
function showTab(key) {
    document.querySelectorAll('.tab-panel').forEach(p => {
        p.classList.toggle('hidden', p.dataset.panel !== key);
        p.classList.toggle('flex', p.dataset.panel === key);
    });
    document.querySelectorAll('.tab-btn').forEach(b => {
        const on = b.dataset.tab === key;
        b.classList.toggle('text-primary', on);
        b.classList.toggle('border-primary', on);
        b.classList.toggle('text-on-surface-variant', !on);
        b.classList.toggle('border-transparent', !on);
    });
}
</script>
</body>
</html>
