<!DOCTYPE html><html class="light" lang="ko" style=""><head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>{{PAGE_TITLE}}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "accent-red": "#E63946",
                        "surface-bright": "#fbf9f9",
                        "on-primary-fixed-variant": "#1c4489",
                        "tertiary-fixed": "#ffdad8",
                        "primary-fixed-dim": "#aec6ff",
                        "inverse-surface": "#303031",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#005db7",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#92001c",
                        "secondary-fixed": "#d6e3ff",
                        "tertiary": "#4d000a",
                        "inverse-primary": "#aec6ff",
                        "primary-container": "#003478",
                        "on-primary-container": "#7d9fe9",
                        "primary-fixed": "#d8e2ff",
                        "on-secondary-container": "#003268",
                        "surface-dim": "#dbdad9",
                        "surface-container-low": "#f5f3f3",
                        "surface-border": "#DCDCDC",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e3e2e2",
                        "surface-container": "#efeded",
                        "secondary-fixed-dim": "#a9c7ff",
                        "on-tertiary-fixed": "#410007",
                        "surface-variant": "#e3e2e2",
                        "on-tertiary-container": "#ff7576",
                        "inverse-on-surface": "#f2f0f0",
                        "outline": "#747782",
                        "surface-light": "#F8F9FA",
                        "text-secondary": "#555555",
                        "on-primary-fixed": "#001a43",
                        "surface-tint": "#395da2",
                        "on-secondary-fixed": "#001b3d",
                        "on-surface-variant": "#434751",
                        "on-secondary-fixed-variant": "#00468c",
                        "on-error-container": "#93000a",
                        "outline-variant": "#c4c6d2",
                        "text-disabled": "#BEBEBE",
                        "secondary-container": "#599bfe",
                        "tertiary-fixed-dim": "#ffb3b1",
                        "on-secondary": "#ffffff",
                        "background": "#fbf9f9",
                        "error-container": "#ffdad6",
                        "surface": "#fbf9f9",
                        "on-background": "#1b1c1c",
                        "text-primary": "#000000",
                        "surface-container-high": "#e9e8e7",
                        "primary": "#00204e",
                        "tertiary-container": "#750015",
                        "on-surface": "#1b1c1c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "margin-desktop": "48px",
                        "gutter": "24px",
                        "base": "4px",
                        "margin-mobile": "16px",
                        "xl": "32px",
                        "lg": "24px",
                        "xs": "4px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["Hanken Grotesk"],
                        "label-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "body-sm": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "label-sm": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Hanken Grotesk', sans-serif; background-color: #fbf9f9; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .icon-fill { font-variation-settings: 'FILL' 1; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c4c6d2; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #747782; }

        /* Chart Animations */
        @keyframes drawBar { from { height: 0; } to { height: var(--target-height); } }
        .animate-bar { animation: drawBar 1s ease-out forwards; }
    </style>
</head>
<body class="bg-background text-on-background overflow-hidden h-screen flex flex-col">
<div class="flex flex-1 overflow-hidden">
    <main class="flex-1 bg-background flex items-center justify-center p-md">
        <!-- Country Information Detail (P1) -->
        <div class="relative z-10 max-w-5xl w-full mx-auto border border-surface-border rounded-xl shadow-[0_4px_8px_rgba(0,32,78,0.12)] flex flex-col h-[calc(100vh-160px)] bg-surface-container-lowest">
            <!-- Header -->
            <div class="flex justify-between items-start p-lg border-surface-border rounded-t-xl shrink-0">
                <div class="flex items-center gap-md">
                    <div class="w-16 h-12 rounded shadow-sm overflow-hidden border border-surface-border flex-shrink-0 bg-surface-container flex items-center justify-center" style="{{FLAG_BG}}">
                        {{FLAG_FALLBACK}}
                    </div>
                    <div>
                        <div class="flex items-baseline gap-sm">
                            <h2 class="font-headline-lg text-headline-lg text-primary">{{COUNTRY_EN}}</h2>
                            <span class="font-body-lg text-body-lg text-on-surface-variant">{{COUNTRY_KO}}</span>
                        </div>
                        <div class="flex items-center gap-sm mt-xs">
                            {{STATUS_BADGE}}
                            <span class="font-label-sm text-label-sm text-outline">Region: {{REGION_LABEL}}</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-sm">
                    <button class="flex items-center gap-xs px-4 py-2 border border-primary text-primary font-label-md text-label-md rounded-lg hover:bg-surface-variant transition-colors">
                        <span class="material-symbols-outlined text-[18px]">play_circle</span>
                        시뮬레이션
                    </button>
                    <button aria-label="Close" class="p-2 text-on-surface-variant hover:text-accent-red hover:bg-error-container rounded-full transition-colors">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
            </div>
            <!-- Content -->
            <div class="flex-1 overflow-y-auto p-lg grid grid-cols-1 lg:grid-cols-2 gap-gutter">
                <!-- Left: General Information & Charts -->
                <div class="flex flex-col gap-lg">
                    <h3 class="font-headline-md text-headline-md text-primary mb-xs flex items-center gap-sm">
                        <span class="material-symbols-outlined text-secondary">monitoring</span>
                        국가 일반 정보
                    </h3>
                    <div class="grid grid-cols-2 gap-sm">
                        {{GENERAL_CARDS}}
                    </div>
                    {{CHARTS}}
                </div>
                <!-- Right: Market / Regulation / System -->
                <div class="flex flex-col gap-lg lg:border-l border-surface-border lg:pl-lg">
                    {{DETAIL_SECTIONS}}
                </div>
            </div>
            <!-- Footer -->
            <div class="flex justify-between items-center gap-md p-md border-t border-surface-border bg-surface-light rounded-b-xl shrink-0">
                <span class="font-label-sm text-label-sm text-outline">{{FOOTER_META}}</span>
                <div class="flex items-center gap-md">
                    <button class="px-4 py-2 border border-surface-border bg-surface text-primary font-label-md text-label-md rounded-lg hover:bg-surface-variant transition-colors">
                        보고서
                    </button>
                    <button class="px-4 py-2 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-on-primary-fixed transition-colors flex items-center gap-xs active:scale-[0.98]">
                        <span class="material-symbols-outlined text-[18px]">download</span>
                        보고서 생성
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>
</body></html>
